# FI-CAD-Predictor 第一版建模配置。
#
# 这个配置文件的目标是把“研究设计”和“训练脚本”分开：
# - 研究设计放在这里，便于论文复现和人工审查。
# - 训练代码只负责按配置执行，避免把关键口径藏在 Python 代码深处。

data:
  curated_root: data/curated
  dataset_path: output/datasets/modeling_dataset.parquet
  outcome_table_path: output/tables/outcome_table.csv
  baseline_feature_path: output/tables/baseline_features.csv
  variable_dictionary_path: output/tables/variable_dictionary.csv
  missingness_path: output/tables/feature_missingness.csv
  correlation_path: output/tables/high_correlation_pairs.csv

run:
  output_root: output/runs
  random_seed: 20260429
  test_size: 0.20
  valid_size: 0.20
  primary_metric: roc_auc
  threshold_strategy: balanced_youden_f1
  min_auc_warning: 0.70
  max_fpr_warning: 0.40
  min_recall_warning: 0.05
  all_negative_rate_warning: 0.98

dataset:
  endpoint_name: heart_related_event_by_2020
  baseline_year: 2011
  horizon_year: 2020
  include_blood_enhanced_features: true
  min_fi_observed_fraction: 0.20

training:
  optuna_trials: 10
  optuna_timeout_seconds: 240
  models:
    - logistic_regression
    - random_forest
    - xgboost
    - lightgbm
    - catboost
  feature_sets:
    primary:
      description: 主分析特征集，保留 2011 基线 FI、人口学、生活方式、慢病、功能和体测变量。
      exclude: []
    no_body_size_demographic:
      description: 敏感性分析特征集，去掉年龄、性别、身高、体重、BMI、腰围等粗变量，检查模型是否仍能从 FI/健康缺陷中获得信号。
      exclude:
        - age_2011
        - sex_code_2011
        - height_cm_2011
        - weight_kg_2011
        - bmi_2011
        - waist_cm_2011
    literature_fi_minimal:
      description: 最小 11 项 FI 模型，只保留文献候选 FI、年龄和性别，用来评估该 FI 本身的预测力。
      include:
        - fi_2011
        - age_2011
        - sex_code_2011
    broad_fi_minimal:
      description: 最小宽口径 FI 模型，只保留探索性宽口径 FI、年龄和性别，用来和 11 项 FI 比较。
      include:
        - fi_broad_exploratory_2011
        - age_2011
        - sex_code_2011

interpretability:
  require_shap: true
  shap_background_size: 300
  shap_explain_size: 500
  top_n_features: 20

archive:
  enabled: true
  directory: output/share
  keep_latest_only: true
